body:
  text: 問禪有幾種法門答曰禪有無量法門若聖理歸真惟存大道故法花經云唯有一乘法餘二即非真問禪師若為坐答端身直住斂手對心累腳重安開眼合口名之為坐故維摩經曰一坐十小劫謂如一食頃問禪師若為方便安心答前念後念凝寂虛平非空非有非色非名定住凝心更無畢想故經云念念相續即得悟道問禪師若為看心心何所緣答曰定心凝寂無滅無生非黑非白非闇非明非長非短非住非行無言無說皎絕際停故法花經云如諸佛所說真實微妙法於此無緣法云何有緣問禪師既無所緣合大乘意會應方便旨歸之處答悟心坦蕩無有旨歸接引禪門定由念起念逐心成去思離想勤行不住非妙非闇非冥清虛杳絕迥悟無生故維摩經云三轉法輪於大千其輪本來常清淨天人得道此為證三寶於是現世間問禪師若為證得清淨答坦然平正絕想離思非意所圖非心可測故法花經云諸法從本來常自寂滅相佛子行道已來世得作佛問禪師既絕思離想若為行道答冥寂無心名為行道故經云言若有所受法墮於斷常知當所受法亦常亦無常問禪師有心即應可進道若無心云何知答身心直住垢靜空閑所以得知故維摩經云過去心不可得未來心不可得現在心不可得故引此證問禪師若為喚作禪答故攝存心無諸放逸六根清淨動轉無虧法花經云安禪合掌說千萬偈問禪師何名為空答冥真絕思不見身相清虛直住皎絕網覆名為空故經云入大寂定名大涅槃問禪師何名入禪答斂容安坐心無散動善惡都捨不染暄塵世見似癡合聖教故法花經云十方國土中唯有一乘法無二亦無三復有一行是如來行問禪師若為坐禪答身心常定隨世散情欣喜稍寬卻於疲厭教清虛氣不染塵荷故法花經云恒在靈鷲山及餘諸住處我淨土不毀而眾見燒盡問禪師何為覺觀答定住凝心心有見聞名之為覺覺無取捨稱之為觀故經云是空亦空是淨亦淨問禪師定有所覺知不答住定悟然都無所覺雖復去來知見不繞心故經云色空愛色愛空問禪師既無所知能受楚毒割截不答不然心堅固空離六塵非是木石癡頑受鎸刺故經云內空外空內空者六根空外空者六塵空名為證問禪師諸法盡空不墮空見耶答空若有見即有所依若有所依名為見著故經云若以色見我以音聲求我是人行邪道不能見如來也既如此空有並非若修道若空有之性即知道從空有而生得意忘言存有空而不失故經云空非空故空此空是空有非有故有此有是空有名名為證也問禪師禪定以後更有思量不答定心平坦無有塵埃定後一處不移念想恒存不散雖復去來知見不染聲塵一想湛然無生無滅故經云王宮生而不生雙樹滅而不滅問禪師四威儀中何者得定答大乘閑靜開通無滯四儀同寂六度俱圓一定清虛更無前後故經云無前無後問禪師應樂山林閑寂何意住在村坊城郭喧嘩之處豈容得定答小心偏仄意好山林非寂不安鬧無由定大道寬弘周流法界示喧如寂見靜不欣雖處四流心無愛染故經云眾生行世間即見世間相菩薩行世間不見世間相問禪師應餐松啖柏何因還同世人相似答理歸真寂唯持心靜何須餐松啖柏服氣扶身心涉六塵無由合道莫見形容相似意實行得道之門豈由自餓故涅槃經云庵羅之果生熟誰知問禪師戒行精研去魔離障何因饒病答戒行修身必得來生果報今身饒病過去業緣現愛除當來樂果故經云現身精進多饒病痛行者肥充此是也業果未圓愚生異解問禪師應著糞掃三衣何意還同世人衣裳相似答道從心起不由破納衣裳行逐身生何論碎衣成道但存心念定三毒不生雖復衣合人心心為聖主如此之意寧將心持身終不將身持心故經曰寧作心師不師於心問禪師能受罵辱楚毒何意諧語面參異答皮膚淺薄隨色變異心意幽深無由可測罵他得罪受辱私欣故經曰罵者是誰打者是誰問禪師德行高明何者被人訶詰作於誹謗唯而無對答行過三界德被無邊受詰彌欣誹謗生喜今雖受屈往業彌長莫見不聲謂無所識謗罵唯深罪積須彌業過阿鼻故經云作色而罵佛其罪尚輕罵受持法花人其罪過於彼問禪師心應平等彼意自違念定不勤倒生偏耳答禪師心恒端直彼心不定見有是非謗毀前人謂言阿曲莫見慘色精神教於無識故經云粗言及軟語皆歸第一義問禪師性行柔和言語低下何因高強精神雄猛用意答出言契理實是合心貶受含靈性行不等柔隨和教強逐剛誹禪師心意坦然身隨世網莫言雄烈即道心非時見溫柔便言證理是故涅槃經云應久住處不知大喻菩薩方知持戒破戒問曰課處即應得坐何意要在房舍禪床始行法教答自心求道隨處得安欲教有緣必依房舍鈍根無智必須盡力護持上行之人通半偈而悟道故菩薩經云有一比丘乞好房舍始可修道佛即喚來與共同房宿當夜得道成羅漢果問意會無生心遊淨境何因出空入有還住世間見於善惡答雖合無生名意遊振旦此土煩鬧喧繞者多若不隨世化無由入理身逐凡情心遊出世雖復現身隱顯身是夫心入至道冥寂幽微非是淺情之能測故心王經云凡身粗重不能遠到他方問修道應須勤苦節身廣學多聞何意端然直坐懵懵無所思量答云存波若淡泊清虛雖復身力不勤心功竭盡廣學知見都無成益嘿念思禪即是出道之梯蹬故經云五百羅漢習學盡世之經書不能迴心返照問佛示定心悲嘆始喜門心意坦然何意還有經論乍惡乍好道是說非答得意忘言亦無好惡是非言二毒未除小智無知身心俱闇或生卑賤習氣未除惡業緣牽還歸舊道利根宿貴心遊曠遠識達苦空體解真如合無生理故經云羅睺是佛之子嬌慢陵天如來一乘柔和更無違犯名為羅睺密行錄文完
