front:
  text: 禪策問答整理者方廣錩題解禪策問答中國禪宗僧人所撰典籍著者不詳一卷本典籍以自設問答的形式論述了禪師修習的種種問題從通篇三十則問答的思想傾向看應屬北宗禪的文獻禪宗雖然主張教外別傳不立文字但本文獻處處引用經文以證成己說反映了禪教鬥爭中部分禪宗僧人的態度本文獻所引經文往往與原文不完全相符這一方面說明當時引文不嚴格另一方面也許是由於展轉引用之故本文獻未為我國歷代經錄所著錄亦未為歷代大藏經所收現於中國北京圖書館所藏敦煌遺書中發現為北新號其詳情請參見本書天竺國菩提達摩禪師論之題解整理本以北京圖書館藏新號為底本無校本本文獻曾於年月日在日本京都禪文化研究所經集體討論整理本吸收了討論會上的不少校訂意見特別吸收了沖本克己先生對本文獻的不少校訂意見與註釋特此說明並向沖本克己及參加討論會的其他諸位先生表示感謝錄文
